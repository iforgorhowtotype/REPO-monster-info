
<style>
h2.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
*{box-sizing:border-box}
.wrap{padding:1rem 0}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.filter-row label{font-size:13px;color:var(--color-text-secondary);white-space:nowrap}
select{font-size:13px;padding:4px 8px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
thead th{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-align:left;padding:6px 10px;border-bottom:0.5px solid var(--color-border-tertiary);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--color-text-primary)}
thead th .arr{margin-left:4px;opacity:0.4;font-style:normal}
thead th.sorted .arr{opacity:1}
tbody tr{border-bottom:0.5px solid var(--color-border-tertiary);transition:background 0.1s}
tbody tr:hover{background:var(--color-background-secondary)}
tbody td{padding:7px 10px;vertical-align:middle}
.name{font-weight:500;font-size:13px}
.badge{display:inline-block;padding:2px 8px;border-radius:var(--border-radius-md);font-size:11px;font-weight:500;white-space:nowrap}
.b-imp{background:#EEEDFE;color:#3C3489}
.b-0{background:#EAF3DE;color:#3B6D11}
.b-4{background:#FAEEDA;color:#854F0B}
.b-7{background:#FAC775;color:#633806}
.b-9{background:#FAECE7;color:#993C1D}
.b-13{background:#FCEBEB;color:#791F1F}
.b-s{background:#F1EFE8;color:#5F5E5A}
.col-name{width:22%}
.col-str{width:19%}
.col-stun{width:21%}
.col-hp{width:13%}
.col-danger{width:25%}
.dpip{display:inline-flex;gap:2px;align-items:center;vertical-align:middle}
.pip{width:7px;height:7px;border-radius:50%;background:var(--color-border-tertiary)}
.pip.on{background:#D85A30}
.count-row{font-size:12px;color:var(--color-text-secondary);margin-top:8px}
@media(max-width:500px){.col-danger,.col-stun{display:none}table{font-size:12px}}
</style>
<h2 class="sr-only">R.E.P.O. monster list sorted by strength required to lift, with stunned strength and HP for all 29 monsters.</h2>
<div class="wrap">
<div class="filter-row">
  <label for="fStr">Filter by strength:</label>
  <select id="fStr">
    <option value="all">All</option>
    <option value="0">0</option>
    <option value="4">4</option>
    <option value="7">7</option>
    <option value="9">9</option>
    <option value="13">13</option>
    <option value="impossible">Impossible</option>
  </select>
  <label for="fDanger" style="margin-left:8px">Danger level:</label>
  <select id="fDanger">
    <option value="all">All</option>
    <option value="1">Level 1</option>
    <option value="2">Level 2</option>
    <option value="3">Level 3</option>
  </select>
</div>
<div class="tbl-wrap">
<table id="tbl">
<thead>
<tr>
  <th class="col-name" onclick="sortBy('name')">Monster <em class="arr">↕</em></th>
  <th class="col-str" onclick="sortBy('str')">Strength to lift <em class="arr">↕</em></th>
  <th class="col-stun">When stunned</th>
  <th class="col-hp" onclick="sortBy('hp')">HP <em class="arr">↕</em></th>
  <th class="col-danger" onclick="sortBy('danger')">Danger level <em class="arr">↕</em></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
<p class="count-row" id="countRow"></p>
</div>
<script>
const monsters=[
  {name:"Gnome",       str:0,           stun:0,           hp:20,  danger:1},
  {name:"Banger",      str:0,           stun:0,           hp:50,  danger:1},
  {name:"Apex Predator",str:"impossible",stun:0,          hp:150, danger:1},
  {name:"Spewer",      str:4,           stun:0,           hp:65,  danger:1},
  {name:"Upscream",    str:4,           stun:0,           hp:50,  danger:2},
  {name:"Tick",        str:0,           stun:0,           hp:10,  danger:1},
  {name:"Peeper",      str:"impossible",stun:"impossible",hp:30,  danger:1},
  {name:"Birthday Boy",str:4,           stun:0,           hp:150, danger:1},
  {name:"Headgrab",    str:4,           stun:0,           hp:150, danger:2},
  {name:"Hidden",      str:4,           stun:1,           hp:100, danger:2},
  {name:"Mentalist",   str:4,           stun:0,           hp:150, danger:2},
  {name:"Rugrat",      str:4,           stun:0,           hp:150, danger:2},
  {name:"Animal",      str:4,           stun:1,           hp:150, danger:2},
  {name:"Bella",       str:9,           stun:0,           hp:200, danger:1},
  {name:"Bowtie",      str:7,           stun:2,           hp:200, danger:2},
  {name:"Chef",        str:9,           stun:2,           hp:150, danger:3},
  {name:"Gambit",      str:9,           stun:3,           hp:150, danger:2},
  {name:"Heart Hugger",str:9,           stun:0,           hp:300, danger:2},
  {name:"Huntsman",    str:9,           stun:1,           hp:250, danger:3},
  {name:"Oogly",       str:9,           stun:0,           hp:200, danger:2},
  {name:"Reaper",      str:9,           stun:1,           hp:250, danger:3},
  {name:"Shadow Child",str:9,           stun:1,           hp:150, danger:1},
  {name:"Cleanup Crew",str:13,          stun:5,           hp:350, danger:3},
  {name:"Clown",       str:13,          stun:3,           hp:250, danger:3},
  {name:"Headman",     str:13,          stun:3,           hp:250, danger:3},
  {name:"Loom",        str:13,          stun:5,           hp:500, danger:3},
  {name:"Robe",        str:13,          stun:6,           hp:250, danger:3},
  {name:"Trudge",      str:13,          stun:5,           hp:500, danger:3},
  {name:"Elsa",        str:"impossible",stun:0,           hp:600, danger:1},
];

function strVal(s){return s==="impossible"?999:s}

let sortKey="str",sortDir=1;

function bStr(s){
  if(s==="impossible")return`<span class="badge b-imp">Impossible</span>`;
  if(s===0)return`<span class="badge b-0">0</span>`;
  if(s===4)return`<span class="badge b-4">4</span>`;
  if(s===7)return`<span class="badge b-7">7</span>`;
  if(s===9)return`<span class="badge b-9">9</span>`;
  if(s===13)return`<span class="badge b-13">13</span>`;
  return s;
}
function bStun(s){
  if(s==="impossible")return`<span class="badge b-imp">Impossible</span>`;
  return`<span class="badge b-s">${s}</span>`;
}
function dpips(d){
  let h='<span class="dpip">';
  for(let i=1;i<=3;i++)h+=`<span class="pip${i<=d?" on":""}"></span>`;
  return h+`</span> ${d}/3`;
}

function render(){
  const fS=document.getElementById("fStr").value;
  const fD=document.getElementById("fDanger").value;
  let data=monsters.filter(m=>{
    const sv=m.str==="impossible"?"impossible":String(m.str);
    if(fS!=="all"&&sv!==fS)return false;
    if(fD!=="all"&&String(m.danger)!==fD)return false;
    return true;
  });
  data.sort((a,b)=>{
    if(sortKey==="name")return sortDir*(a.name<b.name?-1:a.name>b.name?1:0);
    if(sortKey==="hp")return sortDir*(a.hp-b.hp);
    if(sortKey==="str")return sortDir*(strVal(a.str)-strVal(b.str));
    if(sortKey==="danger")return sortDir*(a.danger-b.danger);
    return 0;
  });
  document.getElementById("tbody").innerHTML=data.map(m=>`<tr>
    <td class="name">${m.name}</td>
    <td>${bStr(m.str)}</td>
    <td>${bStun(m.stun)}</td>
    <td>${m.hp}</td>
    <td>${dpips(m.danger)}</td>
  </tr>`).join("");
  document.getElementById("countRow").textContent=`Showing ${data.length} of ${monsters.length} monsters`;
}

function sortBy(key){
  if(sortKey===key)sortDir*=-1;else{sortKey=key;sortDir=1;}
  document.querySelectorAll("thead th").forEach(th=>{
    th.classList.remove("sorted");
    const a=th.querySelector(".arr");
    if(a){a.textContent="↕";a.style.opacity="0.4";}
  });
  const map={name:0,str:1,hp:3,danger:4};
  if(map[key]!==undefined){
    const th=document.querySelectorAll("thead th")[map[key]];
    th.classList.add("sorted");
    const a=th.querySelector(".arr");
    if(a){a.textContent=sortDir===1?"↑":"↓";a.style.opacity="1";}
  }
  render();
}

document.getElementById("fStr").addEventListener("change",render);
document.getElementById("fDanger").addEventListener("change",render);
render();
sortBy("str");
</script>
